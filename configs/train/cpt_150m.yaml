run_name: skull_150m_cpt
run_dir: runs/cpt/skull_150m_cpt

tokenizer_model: data/tokenizer/skull_zh_en_128k_bpe.model
model_config: configs/model/skull_150m.yaml
base_ckpt: runs/pretrain/skull_150m_base/best.pt

device: cuda
mixed_precision: fp16
seed: 42
resume: true

block_size: 1024
bin_dtype: uint32
row_tokens: 1025

train_sources:
  - name: novels
    paths:
      - data/bins/novels/train_000.bin
      - data/bins/novels/train_001.bin
    weight: 2.0

  - name: wiki
    paths:
      - data/bins/wiki/train_000.bin
    weight: 0.5

val_sources:
  - name: novels_val
    paths:
      - data/bins/novels/val_000.bin
    weight: 1.0

batch_size: 8
grad_accum: 8
max_steps: 30000
train_nominal_size: 300000
val_nominal_size: 30000
eval_batches: 50

optimizer: adamw
lr: 5.0e-5
min_lr: 5.0e-6
lr_schedule: cosine
warmup_steps: 500
weight_decay: 0.1
betas: [0.9, 0.95]
eps: 1.0e-8
grad_clip: 1.0

num_workers: 2
log_every: 10
eval_every: 200
save_every: 200
sample_every: 500
sample_max_new_tokens: 96

sample_prompts:
  - 請寫一段奇幻小說開頭。
  - 以第一人稱描寫雨夜城市。
